{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — ContentFlow</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon" style="color: white; font-weight: bold;">CF</div>
                <h2>Get Started</h2>
                <p>Register for a ContentFlow account</p>
            </div>

            {% if error_message %}
            <div class="form-error">
                {{ error_message }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="e.g. john_doe" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required autocomplete="new-password">
                    <div class="password-strength">
                        <div id="passwordStrengthBar" class="password-strength-bar"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="repeatPassword">Confirm Password</label>
                    <input type="password" id="repeatPassword" name="repeatPassword" class="form-input" placeholder="Confirm your password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('passwordStrengthBar');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            strengthBar.className = 'password-strength-bar';
            if (strength <= 1 && val.length > 0) strengthBar.classList.add('weak');
            else if (strength === 2 || strength === 3) strengthBar.classList.add('medium');
            else if (strength >= 4) strengthBar.classList.add('strong');
        });
    </script>
</body>
</html>
