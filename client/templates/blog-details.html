{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.youtube_title }} — ContentFlow</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- ── NAVIGATION (Grounded) ── -->
    <nav class="navbar">
        <a href="/" class="brand">
            <div class="brand-icon">CF</div>
            ContentFlow
        </a>
        <div class="nav-links">
            <span class="user-tag">User: {{ user.username }}</span>
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/blog-list" class="nav-link">Archive</a>
            <a href="/logout" class="nav-link" style="color: var(--danger);">Logout</a>
        </div>
    </nav>

    <div class="container">
        <section class="card" style="padding: 64px;">
            <header style="margin-bottom: 48px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 32px;">
                <h1 style="line-height: 1.2;">{{ article.youtube_title }}</h1>
                <div class="text-secondary" style="margin-top: 16px; font-size: 14px;">
                    <span class="badge">Publication</span>
                    <span style="margin-left: 12px;">Generated on {{ article.created_at|date:"M d, Y" }}</span>
                </div>
            </header>

            <article class="article-body">
                {{ blog_content|safe }}
            </article>

            <footer style="margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center;">
                <a href="/blog-list" class="btn btn-secondary">
                    <i data-lucide="arrow-left" style="width:16px;"></i> Back to Archive
                </a>
                <a href="{{ article.youtube_link }}" target="_blank" class="nav-link" style="color: var(--accent);">
                    View Source Video <i data-lucide="external-link" style="width:14px; margin-left:4px;"></i>
                </a>
            </footer>
        </section>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
