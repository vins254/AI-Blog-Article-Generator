{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ blog_article_detail.youtube_title }} — ContentFlow</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <i data-lucide="layers" class="accent-text"></i>
            ContentFlow<span class="brand-dot">.</span>
        </div>
        <div class="navbar-links">
            <a href="/blog-list" class="btn-nav">Archive</a>
            <a href="/" class="btn-nav">New Article</a>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <i data-lucide="sun" class="sun-icon"></i>
                <i data-lucide="moon" class="moon-icon"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <main class="dashboard">
            <section class="blog-output-section">
                <header class="article-header">
                    <div class="article-meta">
                        <span>{{ blog_article_detail.created_at|date:"F d, Y" }}</span>
                        <span class="dot">·</span>
                        <a href="{{ blog_article_detail.youtube_link }}" target="_blank" class="accent-text">Source Material</a>
                        <span class="dot">·</span>
                        <span id="reading-time"></span>
                    </div>
                    <h1>{{ blog_article_detail.youtube_title }}</h1>
                </header>

                <div id="content-body" class="article-body">
                    {{ blog_article_detail.generated_content|linebreaksbr }}
                </div>

                <footer style="margin-top: 4rem; text-align: center;">
                    <a href="/blog-list" class="btn-text accent-text">
                        <i data-lucide="arrow-left" style="width:16px; height:16px; vertical-align: middle; margin-right: 0.5rem;"></i>
                        Back to Archive
                    </a>
                </footer>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', savedTheme);
            
            themeToggle.addEventListener('click', () => {
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        })();

        window.addEventListener('DOMContentLoaded', () => {
            const body = document.getElementById('content-body');
            const words = body.innerText.split(/\s+/).length;
            const time = Math.max(1, Math.ceil(words / 200));
            document.getElementById('reading-time').textContent = `${time} min read`;
        });
    </script>
</body>
</html>
