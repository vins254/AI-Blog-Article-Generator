{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentFlow — Video to Editorial</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{% static 'js/theme-controller.js' %}"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand">
            <div class="brand-dot"></div>
            ContentFlow
        </a>
        <div class="nav-links">
            <a href="/blog-list" class="nav-link">Archive</a>
            <div id="themeToggle" class="theme-switch" title="Toggle Theme"></div>
            <a href="/logout" class="nav-link" style="color: var(--danger);">Logout</a>
        </div>
    </nav>

    <div class="hero-container">
        <h1 class="hero-h1">Video to Editorial.</h1>
        <p class="hero-p">Turn technical YouTube streams into professional synthesized publications.</p>
        
        <div class="search-utility">
            <input type="url" id="youtubeLink" class="search-input" placeholder="Paste YouTube link here..." required>
            <button id="generateBlogButton" class="btn-action">Generate</button>
        </div>

        <div id="loading-container" style="display: none; margin-top: 2rem; align-items: center; justify-content: center; gap: 12px;">
            <div class="spinner"></div>
            <span id="loadingText" style="color: var(--text-sub); font-size: 0.9rem;">Initializing...</span>
        </div>

        <section id="blogOutput" class="reader-container">
            <div class="reader-card">
                <div id="blogContent" class="editorial-body"></div>
            </div>
        </section>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('cf_last_url');
            const savedContent = localStorage.getItem('cf_last_content');
            if (savedUrl) document.getElementById('youtubeLink').value = savedUrl;
            if (savedContent) {
                document.getElementById('blogContent').innerHTML = savedContent;
                document.getElementById('blogOutput').style.display = 'block';
            }
        });

        document.getElementById('youtubeLink').addEventListener('input', (e) => {
            localStorage.setItem('cf_last_url', e.target.value.trim());
        });

        document.getElementById('generateBlogButton').addEventListener('click', async () => {
            const youtubeLink = document.getElementById('youtubeLink').value.trim();
            const blogContent = document.getElementById('blogContent');
            const blogOutput = document.getElementById('blogOutput');
            const loadingContainer = document.getElementById('loading-container');
            const loadingText = document.getElementById('loadingText');

            if (!youtubeLink) return;

            blogOutput.style.display = 'none';
            loadingContainer.style.display = 'flex';
            document.getElementById('generateBlogButton').disabled = true;

            try {
                const response = await fetch('/generate-blog/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                    body: JSON.stringify({ link: youtubeLink })
                });

                const data = await response.json();
                if (data.task_id) {
                    pollTask(data.task_id);
                } else if (data.error) {
                    throw new Error(data.error);
                }
            } catch (error) {
                console.error('Pipeline Error:', error);
                alert('Error: ' + error.message);
                resetUI();
            }
        });

        async function pollTask(taskId) {
            const loadingText = document.getElementById('loadingText');
            const blogContent = document.getElementById('blogContent');
            const blogOutput = document.getElementById('blogOutput');

            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/task-status/${taskId}/`);
                    const data = await response.json();

                    if (data.status === 'COMPLETED') {
                        clearInterval(pollInterval);
                        blogContent.innerHTML = data.content;
                        blogOutput.style.display = 'block';
                        localStorage.setItem('cf_last_content', data.content);
                        resetUI();
                    } else if (data.status === 'FAILED') {
                        clearInterval(pollInterval);
                        alert('Generation failed.');
                        resetUI();
                    } else {
                        loadingText.textContent = `${data.message} (${data.progress}%)`;
                    }
                } catch (e) {
                    console.error("Polling error:", e);
                }
            }, 2000);
        }

        function resetUI() {
            document.getElementById('generateBlogButton').disabled = false;
            document.getElementById('loading-container').style.display = 'none';
        }
    </script>
</body>
</html>
