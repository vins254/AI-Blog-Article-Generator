{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentFlow — Video to Editorial</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand">
            ContentFlow <span class="brand-badge">App</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link" style="color: var(--text-primary);">Dashboard</a>
            <a href="/blog-list" class="nav-link">Archive</a>
            <a href="/logout" class="nav-link">Logout</a>
        </div>
    </nav>

    <div class="hero-wrapper">
        <div class="hero-content">
            <h1 class="hero-title">Video to Editorial.</h1>
            <p class="hero-subtitle">Convert technical YouTube streams into professional synthesized publications.</p>
            
            <div class="utility-card">
                <input type="url" id="youtubeLink" class="url-input" placeholder="Paste YouTube link here..." required>
                <button id="generateBlogButton" class="action-btn">Generate</button>
            </div>

            <div id="progressContainer" class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="statusText" class="status-text">Initializing engine...</p>
        </div>

        <section id="blogOutput" class="article-section">
            <div class="article-card">
                <div id="blogContent"></div>
            </div>
        </section>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('cf_last_url');
            const savedContent = localStorage.getItem('cf_last_content');
            if (savedUrl) document.getElementById('youtubeLink').value = savedUrl;
            if (savedContent) {
                document.getElementById('blogContent').innerHTML = savedContent;
                document.getElementById('blogOutput').style.display = 'block';
            }
        });

        document.getElementById('youtubeLink').addEventListener('input', (e) => {
            localStorage.setItem('cf_last_url', e.target.value.trim());
        });

        document.getElementById('generateBlogButton').addEventListener('click', async () => {
            const youtubeLink = document.getElementById('youtubeLink').value.trim();
            const blogContent = document.getElementById('blogContent');
            const blogOutput = document.getElementById('blogOutput');
            const progressContainer = document.getElementById('progressContainer');
            const statusText = document.getElementById('statusText');

            if (!youtubeLink) return;

            // Reset UI
            blogOutput.style.display = 'none';
            progressContainer.style.display = 'block';
            statusText.style.display = 'block';
            document.getElementById('generateBlogButton').disabled = true;

            try {
                const response = await fetch('/generate-blog/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                    body: JSON.stringify({ link: youtubeLink })
                });

                const data = await response.json();
                if (data.task_id) {
                    pollTask(data.task_id);
                } else if (data.error) {
                    throw new Error(data.error);
                }
            } catch (error) {
                console.error('Pipeline Error:', error);
                alert('Error: ' + error.message);
                resetUI();
            }
        });

        async function pollTask(taskId) {
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            const blogContent = document.getElementById('blogContent');
            const blogOutput = document.getElementById('blogOutput');

            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/task-status/${taskId}/`);
                    const data = await response.json();

                    if (data.status === 'COMPLETED') {
                        clearInterval(pollInterval);
                        blogContent.innerHTML = data.content;
                        blogOutput.style.display = 'block';
                        localStorage.setItem('cf_last_content', data.content);
                        resetUI();
                    } else if (data.status === 'FAILED') {
                        clearInterval(pollInterval);
                        alert('Generation failed.');
                        resetUI();
                    } else {
                        statusText.textContent = `${data.message} (${data.progress}%)`;
                        progressBar.style.width = `${data.progress}%`;
                    }
                } catch (e) {
                    console.error("Polling error:", e);
                }
            }, 2000);
        }

        function resetUI() {
            document.getElementById('generateBlogButton').disabled = false;
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('statusText').style.display = 'none';
        }
    </script>
</body>
</html>
